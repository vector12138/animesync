version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: animesync
      POSTGRES_PASSWORD: animesync
      POSTGRES_DB: animesync
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U animesync"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    environment:
      DATABASE_URL: "postgresql+asyncpg://animesync:animesync@db:5432/animesync"
      PROJECT_DISCOVERY_TYPE: auto
      LOGIN_PROVIDER: db
      UI_TYPE: terminal
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./client:/app/client:ro

  # 前端 (静态文件由服务器提供，也可以单独 clone client 到某个 nginx 容器)
  # client:
  #   image: nginx:alpine
  #   volumes:
  #     - ./client:/usr/share/nginx/html:ro
  #   ports:
  #     - "80:80"

volumes:
  pgdata:
